[build]
  command = "npm run build"
  publish = "dist"

# HTMLは常に最新版を配信（キャッシュ禁止）
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/CSSはハッシュ付きファイル名なので長期キャッシュOK
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
